<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Snow Flower</title>
  <style>
    html, body {
      background-color: #2e004f;
      height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      font-family: Arial, sans-serif;
      cursor: none !important;
      color: white;
      padding: 40px;
    }
    .container {
      display: flex;
      align-items: center;
      background-color: rgba(0,0,0,0.4);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 20px #a64dff;
      z-index: 2;
    }
    .cover {
      width: 200px;
      height: 200px;
      border-radius: 10px;
      margin-right: 20px;
      box-shadow: 0 0 15px #a64dff;
    }
    .info {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .info h2 {
      margin: 0 0 10px 0;
      font-size: 24px;
      color: #a64dff;
      text-shadow: 0 0 10px #a64dff, 0 0 20px #a64dff;
    }
    input[type="range"] {
      width: 250px;
      accent-color: white; /* barra blanca */
      margin-top: 10px;
    }
    button {
      margin-top: 10px;
      padding: 8px 15px;
      border: none;
      border-radius: 5px;
      background-color: #a64dff;
      color: white;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 0 10px #a64dff;
    }
    .cursor {
      position: fixed;
      width: 96px;
      height: 96px;
      object-fit: contain;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
    }
    /* Texto debajo del reproductor */
    .mensaje {
      margin-top: 20px;
      background-color: rgba(0,0,0,0.5);
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 15px #a64dff;
      color: #d9b3ff; /* morado claro */
      font-size: 20px; /* más grande */
      line-height: 1.6;
      max-width: 600px;
    }
    /* GIF de adorno en la esquina superior derecha */
    .decoracion {
      position: fixed;
      right: 0;
      top: 0;
      width: 420px;
      height: auto;
      z-index: 1;
      opacity: 1;
    }
    /* GIF gato grande debajo de las flores */
    .gato {
      position: fixed;
      right: 60px;   /* más a la derecha */
      bottom: 20px;  /* debajo de las flores */
      width: 400px;  /* más grande */
      height: auto;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Portada a la izquierda -->
    <img src="cover.png" alt="Portada" class="cover">

    <!-- Nombre, barra y botón a la derecha -->
    <div class="info">
      <h2>Snow Flower</h2>
      <audio id="audio" src="snowflower.mp3" autoplay loop></audio>
      <input type="range" id="progress" value="0" max="100">
      <button id="playPause">⏸ Pausar</button>
    </div>
  </div>

  <!-- Texto debajo del reproductor -->
  <div class="mensaje">
    Espero que hoy tengas un día increíble y que lo disfrutes mucho.  
    Tal vez yo esté dormido porque me desvelé, pero aun así quería desearte algo especial.  
    Ojalá tengas un día muy bonito. 🌸
  </div>

  <!-- Cursor Kuromi -->
  <img src="kuromi normal.gif" class="cursor" id="cursor">

  <!-- GIF de adorno en la esquina superior derecha -->
  <img src="adorno.gif" alt="Decoración" class="decoracion">

  <!-- GIF gato grande debajo de las flores -->
  <img src="gato.gif" alt="Gato" class="gato">

  <script>
    const audio = document.getElementById("audio");
    const progress = document.getElementById("progress");
    const playPauseBtn = document.getElementById("playPause");

    // Actualizar barra de progreso
    audio.addEventListener("timeupdate", () => {
      if (audio.duration > 0) {
        progress.value = (audio.currentTime / audio.duration) * 100;
      }
    });

    // Permitir mover la barra
    progress.addEventListener("input", () => {
      audio.currentTime = (progress.value / 100) * audio.duration;
    });

    // Botón Play/Pausa
    playPauseBtn.addEventListener("click", () => {
      if (audio.paused) {
        audio.play();
        playPauseBtn.textContent = "⏸ Pausar";
      } else {
        audio.pause();
        playPauseBtn.textContent = "▶️ Reproducir";
      }
    });

    // Cursor Kuromi
    const cursor = document.getElementById("cursor");
    const gifs = {
      activo: "kuromi normal.gif",
      inactivo: "kuromi dormido.gif",
      enojado: "kuromi enojada.gif"
    };
    let inactividadTimer;
    document.addEventListener("mousemove", e => {
      cursor.style.left = e.pageX + "px";
      cursor.style.top = e.pageY + "px";
      cursor.src = gifs.activo;
      resetInactividad();
    });
    function resetInactividad() {
      clearTimeout(inactividadTimer);
      inactividadTimer = setTimeout(() => {
        cursor.src = gifs.inactivo;
      }, 3000);
    }
    document.addEventListener("mousedown", () => cursor.src = gifs.enojado);
    document.addEventListener("mouseup", () => {cursor.src = gifs.activo; resetInactividad();});
    resetInactividad();
  </script>
</body>
</html>
